<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>상품 상세</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="soft">
<header class="nav purple">
  <b>COSMIC MALL</b>
  <a href="index.html">HOME</a><a href="list.html">CLOTHING</a>
  <span class="right">⌕  ♡  🛒</span>
</header>

<main class="detail">
  <p class="path">HOME &gt; CLOTHING &gt; 상의 &gt; 오로라 크롭 후드</p>
  <section class="detail-grid">
    <div>
      <div class="main-img hoodie" src="./images/orola_crp_hood.png" alt="오로라 크롭 후드"></div>
      <div class="thumbs"><div class="img hoodie"></div><div class="img tshirt"></div><div class="img pants"></div><div class="img dress"></div></div>
    </div>
    <div class="info">
      <h1>오로라 크롭 후드</h1>
      <h2>39,000원</h2>
      <p>★ 4.8 (128)</p>

      <label>COLOR</label>
      <div><button class="color c1"></button><button class="color c2"></button><button class="color c3"></button></div>

      <label>SIZE</label>
      <div><button class="size">S</button><button class="size selected">M</button><button class="size">L</button></div>

      <label>수량</label>
      <div><button class="size">-</button><input class="qty" value="1" readonly><button class="size">+</button></div>

      <button class="btn wide" onclick="openConfirm()">장바구니 담기</button>
      <button class="dark wide">바로 구매하기</button>
    </div>
  </section>

  <div class="tabs"><button>상품 정보</button><button>사이즈 가이드</button><button>배송 안내</button><button>리뷰 (128)</button></div>
  <section class="desc">
    <p>오로라빛 컬러와 메탈릭 무드가 돋보이는 후드입니다.</p>
    <ul><li>소재: 폴리 60% / 레이온 40%</li><li>핏: 크롭핏</li><li>모델: 164cm / 착용 사이즈 M</li></ul>
  </section>
</main>

<div class="modal-bg" id="confirmModal">
  <div class="modal">
    <div class="circle">🛒</div>
    <h3>장바구니에 추가하시겠습니까?</h3>
    <button class="outline" onclick="closeConfirm()">취소</button>
    <button class="btn" onclick="showDone()">확인</button>
  </div>
</div>

<div class="modal-bg" id="doneModal">
  <div class="modal">
    <div class="circle check">✓</div>
    <h3>장바구니에 추가되었습니다.</h3>
    <a class="btn" href="cart.html">장바구니 보기</a>
    <button class="outline" onclick="closeDone()">쇼핑 계속하기</button>
  </div>
</div>

<script src="js/product.js"></script>
</body>
</html>
